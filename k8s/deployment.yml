name: ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # L'immagine forzata in minuscolo per GHCR
  IMAGE_NAME: ghcr.io/mattegila/landing-page

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests

  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Usiamo un solo tag fisso: latest
          tags: ${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:github-actions

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace and Registry Secret
        run: |
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update Kubernetes manifests and Deploy
        run: |
          # Sostituisce l'immagine con il tag 'latest'
          sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:latest|g" k8s/deployment.yml
          
          # Per forzare Kubernetes a scaricare il nuovo 'latest', aggiungiamo un'annotazione per riavviare i pod
          kubectl apply -f k8s/deployment.yml -n staging
          kubectl rollout restart deployment/landing-app -n staging
          
          kubectl rollout status deployment/landing-app -n staging --timeout=3m

      - name: Show app URL
        run: |
          echo "✅ Deploy completato con successo!"
          NODE_PORT=$(kubectl get svc landing-app -n staging -o jsonpath='{.spec.ports[0].nodePort}')
          TAILSCALE_IP=$(echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d | grep server | awk -F/ '{print $3}' | cut -d: -f1)
          echo "🌐 La tua Landing Page è visibile qui: http://${TAILSCALE_IP}:${NODE_PORT}"