---
# DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landing-app
  template:
    metadata:
      labels:
        app: landing-app
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
      - name: landing-app
        image: ghcr.io/mattegila/landing-page:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

---
# SERVICE
apiVersion: v1
kind: Service
metadata:
  name: landing-app
spec:
  type: NodePort
  selector:
    app: landing-app
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30080