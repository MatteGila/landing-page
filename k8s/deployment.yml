# Deployment — gestisce i Pod della tua app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-app
  labels:
    app: landing-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landing-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: landing-app
    spec:
      # Fondamentale per scaricare l'immagine da GHCR
      containers:
      - name: landing-app
        image: landing-app:local
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

---
# Service — espone i Pod all'interno del cluster
apiVersion: v1
kind: Service
metadata:
  name: landing-app
spec:
  selector:
    app: landing-app
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30080  # Porta fissa sulla VM
  type: NodePort