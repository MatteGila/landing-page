name: ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests

  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,prefix=sha-

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:github-actions

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace and Registry Secret
        run: |
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update Kubernetes manifests and Deploy
        run: |
          # 1. Converte l'IMAGE_NAME in tutto minuscolo per rispettare le regole Docker
          LOWERCASE_IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          
          # 2. Sostituisce l'immagine nel deployment.yml
          sed -i "s|image: .*|image: ${LOWERCASE_IMAGE}:sha-${{ github.sha }}|g" k8s/deployment.yml
          
          # 3. Applica al cluster
          kubectl apply -f k8s/deployment.yml -n staging
          
          # 4. Aspetta che i pod partano
          kubectl rollout status deployment/landing-app -n staging --timeout=3m

      - name: Show app URL
        run: |
          echo "✅ Deploy completato con successo!"
          NODE_PORT=$(kubectl get svc landing-app -n staging -o jsonpath='{.spec.ports[0].nodePort}')
          TAILSCALE_IP=$(echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d | grep server | awk -F/ '{print $3}' | cut -d: -f1)
          echo "🌐 La tua Landing Page è visibile qui: http://${TAILSCALE_IP}:${NODE_PORT}"